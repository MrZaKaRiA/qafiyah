services:
  db:
    image: postgres:17-alpine
    container_name: qafiyah-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: qafiyah
      POSTGRES_PASSWORD: qafiyah
      POSTGRES_DB: qafiyah
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U qafiyah -d qafiyah"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  db_data:
    name: qafiyah-db-data
