services:
  db:
    image: postgres:17-alpine
    container_name: qafiyah-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: qafiyah
      POSTGRES_PASSWORD: qafiyah
      POSTGRES_DB: qafiyah
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # First-boot auto-seed: on a fresh volume, Postgres runs db-init.sh which
      # restores the newest dump from /dumps. Skipped when the volume has data.
      - ./dumps:/dumps:ro
      - ./scripts/db-init.sh:/docker-entrypoint-initdb.d/10-restore.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U qafiyah -d qafiyah"]
      interval: 10s
      timeout: 5s
      # Generous start_period covers the first-boot dump restore (minutes) so
      # dependents waiting on `condition: service_healthy` don't time out.
      retries: 60
      start_period: 300s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: qafiyah-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Internal network: service name `db`, internal port 5432.
      DATABASE_URL: postgresql://qafiyah:qafiyah@db:5432/qafiyah
      ENVIRONMENT: production
      PORT: "8787"
    ports:
      - "8787:8787"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: qafiyah-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      # SSR pages call the api service over the internal compose network.
      INTERNAL_API_URL: http://api:8787
    ports:
      - "80:80"

volumes:
  db_data:
    name: qafiyah-db-data
