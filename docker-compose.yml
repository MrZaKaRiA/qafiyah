services:
  db:
    image: postgres:18-alpine
    container_name: qafiyah-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qafiyah}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qafiyah}
      POSTGRES_DB: ${POSTGRES_DB:-qafiyah}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      # @NOTE: PG18+ stores data in a major-versioned subdir, so the volume must
      # mount at /var/lib/postgresql (not .../data) or the image refuses to boot.
      - db_data:/var/lib/postgresql
      - ./dumps:/dumps:ro
      - ./scripts/db-init.sh:/docker-entrypoint-initdb.d/10-restore.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${POSTGRES_USER:-qafiyah} -d ${POSTGRES_DB:-qafiyah}"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 300s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: qafiyah-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-qafiyah}:${POSTGRES_PASSWORD:-qafiyah}@db:5432/${POSTGRES_DB:-qafiyah}
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ENVIRONMENT: ${ENVIRONMENT:-production}
      PORT: "8787"
    ports:
      - "127.0.0.1:8787:8787"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: qafiyah-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      INTERNAL_API_URL: http://api:8787
    ports:
      - "127.0.0.1:80:8080"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.2
    container_name: qafiyah-es
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      bootstrap.memory_lock: "true"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      ingest.geoip.downloader.enabled: "false"
    ulimits:
      memlock: { soft: -1, hard: -1 }
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: qafiyah-worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-qafiyah}:${POSTGRES_PASSWORD:-qafiyah}@db:5432/${POSTGRES_DB:-qafiyah}
      ELASTICSEARCH_URL: http://elasticsearch:9200
      WORKER_PORT: "8088"
      RECONCILE_TOKEN: ${RECONCILE_TOKEN:-}
    ports:
      - "127.0.0.1:8088:8088"

volumes:
  db_data:
    name: qafiyah-db-data
  es_data:
    name: qafiyah-es-data
