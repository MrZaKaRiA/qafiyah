name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  format-and-lint:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: Format
        run: pnpm run format

      - name: Lint
        run: pnpm run lint

      - name: Types
        run: pnpm run types

      - name: Test
        run: pnpm run test

      - name: Knip
        run: pnpm run knip

      - name: Madge
        run: pnpm run madge

      - name: Check for changes
        id: verify-changed-files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Code formatting or linting issues were found and fixed."
            echo "Please commit the changes and push again."
            git diff
            exit 1
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Code is properly formatted and linted."
          fi
