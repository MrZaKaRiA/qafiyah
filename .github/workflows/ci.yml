name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  format-and-lint:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format
        run: bun run format

      - name: Lint
        run: bun run lint

      - name: Types
        run: bun run types

      - name: Test
        run: bun run test

      - name: Knip
        run: bun run knip

      - name: Madge
        run: bun run madge

      - name: Check for changes
        id: verify-changed-files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Code formatting or linting issues were found and fixed."
            echo "Please commit the changes and push again."
            git diff
            exit 1
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Code is properly formatted and linted."
          fi
