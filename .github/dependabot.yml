version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
      include: scope
    groups:
      types:
        patterns:
          - '@types/*'
      biome-prettier:
        patterns:
          - '@biomejs/*'
          - 'prettier'
          - 'prettier-*'
      commitlint:
        patterns:
          - '@commitlint/*'

  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps,web)'
      include: scope

  - package-ecosystem: npm
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps,api)'
      include: scope

  - package-ecosystem: npm
    directory: /apps/bot
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps,bot)'
      include: scope

  - package-ecosystem: npm
    directory: /packages/db
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps,db)'
      include: scope

  - package-ecosystem: npm
    directory: /packages/contracts
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps,contracts)'
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(ci)'
