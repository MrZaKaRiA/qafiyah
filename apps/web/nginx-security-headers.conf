# Baseline security response headers. Included at server scope AND in every
# location that declares its own add_header (/healthz, /_astro/, @astro) —
# nginx does NOT inherit a server-level add_header into a location that sets any
# add_header of its own, so these must be repeated, not set once. `always` sends
# them on error responses (4xx/5xx) too.
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-Frame-Options "DENY" always;
