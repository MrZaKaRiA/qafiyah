# Web container nginx: caches SSR HTML, serves built static assets from disk,
# canonicalizes URLs, and proxies HTML to the Astro standalone server on
# 127.0.0.1:4321. Runs fully non-root: listens on 8080, writes its pid and temp
# files under /tmp, and logs to stdout/stderr (Docker captures both).
worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;
events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  access_log /dev/stdout;
  sendfile on;
  charset utf-8;
  charset_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # Don't leak the nginx version in responses/error pages.
  server_tokens off;

  # Compress text responses (assets in /_astro are already minified but small
  # wins remain). Skips already-compressed binary types.
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml;

  # Non-root nginx can't write the default /var/lib/nginx temp paths.
  client_body_temp_path /tmp/nginx-client;
  proxy_temp_path /tmp/nginx-proxy;
  fastcgi_temp_path /tmp/nginx-fastcgi;
  uwsgi_temp_path /tmp/nginx-uwsgi;
  scgi_temp_path /tmp/nginx-scgi;

  proxy_cache_path /var/cache/nginx/astro levels=1:2 keys_zone=astro:10m
                   max_size=1g inactive=24h use_temp_path=off;

  server {
    listen 8080;
    server_name qafiyah.com www.qafiyah.com;
    root /app/apps/web/dist/client;

    # Container-local liveness probe: no upstream, no DB.
    location = /healthz {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    # Canonicalize www -> apex.
    if ($host = www.qafiyah.com) {
      return 301 $scheme://qafiyah.com$request_uri;
    }
    # Canonicalize trailing slash -> none (skips the root path).
    rewrite ^/(.+)/$ /$1 permanent;

    # Content-hashed assets: serve from disk, cache forever.
    location /_astro/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # Static file from disk if it exists (favicon, fonts, robots.txt, manifest,
    # images); otherwise hand off to the SSR origin.
    location / {
      try_files $uri @astro;
    }

    location @astro {
      proxy_pass http://127.0.0.1:4321;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache astro;
      proxy_cache_key "$scheme$host$uri"; # path only — query never fragments/poisons cache
      proxy_cache_lock on; # collapse concurrent misses for the same key
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
      proxy_cache_background_update on; # SWR: serve stale, refresh in background
      add_header X-Cache-Status $upstream_cache_status;
      # TTL is taken from the upstream Cache-Control the Astro page sets.
    }
  }
}
