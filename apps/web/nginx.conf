# Web container nginx: caches SSR HTML, serves built static assets from disk,
# canonicalizes URLs, and proxies HTML to the Astro standalone server on
# 127.0.0.1:4321. Runs fully non-root: listens on 8080, writes its pid and temp
# files under /tmp, and logs to stdout/stderr (Docker captures both).
#
# Cloudflare Tunnel architecture: TLS terminates at the edge and cloudflared
# reaches this container over plaintext loopback, so `$scheme` is always `http`
# and `$remote_addr` is the Docker bridge gateway. Redirects therefore target
# https explicitly (host change) or stay relative (same host) — never `$scheme`,
# which would emit `http://...:8080` — and the real client arrives in
# CF-Connecting-IP, not `$remote_addr`.
worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;
events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  access_log /dev/stdout;
  sendfile on;
  charset utf-8;
  charset_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # Don't leak the nginx version in responses/error pages.
  server_tokens off;

  # Real visitor IP: every request arrives from the local cloudflared via the
  # Docker bridge gateway, so trust that source and read the client from
  # Cloudflare's CF-Connecting-IP. The published port binds to 127.0.0.1, so only
  # the host's cloudflared can reach nginx — nothing external can spoof it.
  # 172.16.0.0/12 (Linux Docker default + compose bridges) and 192.168.0.0/16
  # (Docker Desktop) cover the bridge gateway on either host; trusting RFC1918 is
  # safe here since the loopback-bound port admits only the local cloudflared.
  # Confirm the observed source in the access log on deploy (see docs/DEPLOYMENT.md).
  set_real_ip_from 172.16.0.0/12;
  set_real_ip_from 192.168.0.0/16;
  real_ip_header CF-Connecting-IP;

  # Compress text responses (assets in /_astro are already minified but small
  # wins remain). Skips already-compressed binary types.
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml;

  # Non-root nginx can't write the default /var/lib/nginx temp paths.
  client_body_temp_path /tmp/nginx-client;
  proxy_temp_path /tmp/nginx-proxy;
  fastcgi_temp_path /tmp/nginx-fastcgi;
  uwsgi_temp_path /tmp/nginx-uwsgi;
  scgi_temp_path /tmp/nginx-scgi;

  proxy_cache_path /var/cache/nginx/astro levels=1:2 keys_zone=astro:10m
                   max_size=1g inactive=24h use_temp_path=off;

  # Canonicalize www -> apex. Own server block (no `if`): the tunnel forwards the
  # original Host, so www.qafiyah.com lands here. Hardcoded https because the
  # public origin is https-only and `$scheme` is http behind the tunnel.
  server {
    listen 8080;
    server_name www.qafiyah.com;
    include /etc/nginx/nginx-security-headers.conf; # apply the headers to the 301 too
    return 301 https://qafiyah.com$request_uri;
  }

  # Apex, and default for any other Host (e.g. the 127.0.0.1 /healthz probe).
  server {
    listen 8080 default_server;
    server_name qafiyah.com;
    root /app/apps/web/dist/client;

    # Same-host redirects stay relative so the browser keeps the https it used to
    # reach Cloudflare; an absolute Location would emit http://...:8080 (the TLS
    # and the public port live at the edge, not here).
    absolute_redirect off;

    # Baseline security headers for this server. nginx drops inherited add_header
    # in any location that sets its own, so this include is repeated in /healthz,
    # /_astro/, and @astro below — keep all call sites in sync.
    include /etc/nginx/nginx-security-headers.conf;

    # Canonicalize trailing slash -> none (root path unaffected: the regex needs
    # 1+ chars before the slash). Relative 301 via absolute_redirect off.
    rewrite ^/(.+)/$ /$1 permanent;

    # Container-local liveness probe: no upstream, no DB.
    location = /healthz {
      access_log off;
      include /etc/nginx/nginx-security-headers.conf;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    # Content-hashed assets: serve from disk, cache forever.
    location /_astro/ {
      include /etc/nginx/nginx-security-headers.conf;
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # Static file from disk if it exists (favicon, fonts, robots.txt, manifest,
    # images); otherwise hand off to the SSR origin.
    location / {
      try_files $uri @astro;
    }

    location @astro {
      include /etc/nginx/nginx-security-headers.conf;
      proxy_pass http://127.0.0.1:4321;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https; # public origin is https-only
      proxy_cache astro;
      proxy_cache_key "$host$uri"; # path only — query never fragments/poisons cache
      proxy_cache_lock on; # collapse concurrent misses for the same key
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
      proxy_cache_background_update on; # SWR: serve stale, refresh in background
      add_header X-Cache-Status $upstream_cache_status;
      # TTL is taken from the upstream Cache-Control the Astro page sets.
    }
  }
}
