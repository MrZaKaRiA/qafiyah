worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;
events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  access_log /dev/stdout;
  sendfile on;
  charset utf-8;
  charset_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  server_tokens off;

  set_real_ip_from 172.16.0.0/12;
  set_real_ip_from 192.168.0.0/16;
  real_ip_header CF-Connecting-IP;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml;

  client_body_temp_path /tmp/nginx-client;
  proxy_temp_path /tmp/nginx-proxy;
  fastcgi_temp_path /tmp/nginx-fastcgi;
  uwsgi_temp_path /tmp/nginx-uwsgi;
  scgi_temp_path /tmp/nginx-scgi;

  proxy_cache_path /var/cache/nginx/astro levels=1:2 keys_zone=astro:10m
                   max_size=1g inactive=24h use_temp_path=off;

  server {
    listen 8080;
    server_name www.qafiyah.com;
    include /etc/nginx/nginx-security-headers.conf;
    return 301 https://qafiyah.com$request_uri;
  }

  server {
    listen 8080 default_server;
    server_name qafiyah.com;
    root /app/apps/web/dist/client;

    absolute_redirect off;

    include /etc/nginx/nginx-security-headers.conf;

    rewrite ^/(.+)/$ /$1 permanent;

    location = /healthz {
      access_log off;
      include /etc/nginx/nginx-security-headers.conf;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    location /_astro/ {
      include /etc/nginx/nginx-security-headers.conf;
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    location / {
      try_files $uri @astro;
    }

    location @astro {
      include /etc/nginx/nginx-security-headers.conf;
      proxy_pass http://127.0.0.1:4321;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_cache astro;
      proxy_cache_key "$host$uri";
      proxy_cache_lock on;
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
      proxy_cache_background_update on;
      add_header X-Cache-Status $upstream_cache_status;
    }
  }
}
