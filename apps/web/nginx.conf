# Reference nginx config for serving the Astro static build on the VPS.
# Deploy: build locally with `pnpm --filter @qafiyah/web build`, then rsync
# `apps/web/dist/` to the server's web root (default below: /var/www/qafiyah).
#
# Install: copy to /etc/nginx/sites-available/qafiyah.conf, symlink into
# sites-enabled, run `nginx -t && systemctl reload nginx`.
# TLS is intentionally omitted — manage certs via certbot or your reverse-proxy
# layer; this file documents only the static-serving + URL-canonicalization rules.

server {
  listen 80;
  listen [::]:80;
  server_name qafiyah.com www.qafiyah.com;

  root /var/www/qafiyah;
  index index.html;

  # Canonicalize www -> apex.
  if ($host = www.qafiyah.com) {
    return 301 $scheme://qafiyah.com$request_uri;
  }

  # Canonicalize trailing slash -> no slash. Skips the root path.
  rewrite ^/(.+)/$ /$1 permanent;

  # /about resolves to /about/index.html; real files served as-is; otherwise 404.
  location / {
    try_files $uri $uri/index.html =404;
  }

  # Astro emits content-hashed filenames under /_astro — safe to cache forever.
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  error_page 404 /404.html;
}
